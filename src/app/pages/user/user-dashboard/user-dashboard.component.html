<div class="bootstrap-wrapper">
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar column: only shows if isSidebarOpen is true -->
      <div class="col-md-2" *ngIf="isSidebarOpen">
        <app-sidebar-user></app-sidebar-user>
      </div>

      <!-- Dynamic class: Expands to 12 columns if sidebar is hidden -->
      <div [class]="isSidebarOpen ? 'col-md-10' : 'col-md-12'">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
